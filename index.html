  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';

      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)

    } catch (e) { /* ignore */ }
    return;
  }

      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()

      return;

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {

      }

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true

    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }

<div class="p-4 max-w-7xl mx-auto"><div class="bg-gradient-to-r from-[#e50914] to-orange-600 rounded-2xl p-6 mb-4"><h1 class="text-2xl font-black">FLIXLIT v14 PERMANENT - No Expire</h1><div class="flex gap-2 mt-3"><button onclick="loadFromBlob()" class="bg-white text-black px-4 py-2 rounded-full font-bold text-xs">Refresh</button><button onclick="restoreBackup()" class="bg-black/40 px-4 py-2 rounded-full text-xs">Restore Backup</button><span id="blobInfo" class="text-[10px] bg-black/30 px-2 py-1 rounded-full"></span></div></div>

<script>
let movies=[]; let BLOB_ID="1384152150843904002"; let blobId=localStorage.getItem('flixlit_blobId_v14')||localStorage.getItem('flixlit_blobId_v13')||BLOB_ID; let currentFilter='all';
function closePlayer(){document.getElementById('player').classList.add('hidden'); document.getElementById('vid').pause();}
async function createNewBlob(data){ try{ let res=await fetch('https://jsonblob.com/api/jsonBlob',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}); if(res.ok){ let loc=res.headers.get('Location')||res.headers.get('location'); if(loc){ let id=loc.split('/').pop(); blobId=id; localStorage.setItem('flixlit_blobId_v14',id); return id; } } }catch(e){} return null; }
async function loadFromBlob(){ try{ document.getElementById('status').innerText='Loading v14...'; let res=await fetch('https://jsonblob.com/api/jsonBlob/'+blobId); if(res.status===404){ let backup=JSON.parse(localStorage.getItem('flixlit_backup_v14')||localStorage.getItem('flixlit_backup_v13')||'[]'); if(backup.length>0){ let newId=await createNewBlob(backup); movies=backup; render(); document.getElementById('status').innerText='Blob expired - restored '+backup.length+' to new blob '+newId; document.getElementById('blobInfo').innerText='New Blob: '+newId; return; } document.getElementById('status').innerText='Blob expired - no backup'; movies=[]; render(); return; } let data=res.ok?await res.json():[]; movies=Array.isArray(data)?data:JSON.parse(localStorage.getItem('flixlit_backup_v14')||'[]'); localStorage.setItem('flixlit_backup_v14', JSON.stringify(movies)); render(); document.getElementById('status').innerText=movies.length+' movies - Permanent!'; document.getElementById('blobInfo').innerText=blobId.slice(0,8)+'... '+movies.length+' movies'; }catch(e){ movies=JSON.parse(localStorage.getItem('flixlit_backup_v14')||localStorage.getItem('flixlit_backup_v13')||'[]'); render(); document.getElementById('status').innerText='Offline backup '+movies.length; } }
function restoreBackup(){ let b=JSON.parse(localStorage.getItem('flixlit_backup_v14')||localStorage.getItem('flixlit_backup_v13')||'[]'); movies=b; render(); toast('Restored '+b.length); }
function filterType(t){ currentFilter=t; document.getElementById('fAll').className=t==='all'?'px-3 py-1 rounded-full text-xs bg-white text-black font-bold':'px-3 py-1 rounded-full text-xs bg-white/10'; document.getElementById('fMovie').className=t==='movie'?'px-3 py-1 rounded-full text-xs bg-white text-black font-bold':'px-3 py-1 rounded-full text-xs bg-white/10'; document.getElementById('fSeries').className=t==='series'?'px-3 py-1 rounded-full text-xs bg-white text-black font-bold':'px-3 py-1 rounded-full text-xs bg-white/10'; render(); }
function render(){ let g=document.getElementById('grid'); g.innerHTML=''; let q=document.getElementById('search').value.toLowerCase(); if(movies.length===0){ g.innerHTML='<div class="col-span-full p-8 bg-[#151821] rounded-xl text-center"><p class="text-white/50">No movies</p><p class="text-xs text-white/30 mt-2">Use v14 creator with permanent links: Telegram @getpubliclink_bot (best, never expire) or Catbox.moe - Avoid tmpfiles.org wey dey expire!</p></div>'; return; } let filtered=movies.filter(m=>{ if(currentFilter!=='all'&&m.type!==currentFilter) return false; if(q&&!m.title.toLowerCase().includes(q)) return false; return true; }); filtered.forEach(m=>{ let d=document.createElement('div'); d.className='bg-[#151821] rounded-xl overflow-hidden cursor-pointer border border-white/5'; let poster=m.poster?'<img src="'+m.poster+'" class="w-full h-full object-cover">':'<div class="w-full h-full bg-gradient-to-br from-red-600 to-orange-600 flex items-center justify-center text-3xl font-black">'+m.title[0]+'</div>'; let badge=m.type==='series'?'<span class="absolute top-2 left-2 bg-blue-600 text-[9px] px-2 py-0.5 rounded-full font-bold">SERIES</span>':'<span class="absolute top-2 left-2 bg-green-600 text-[9px] px-2 py-0.5 rounded-full font-bold">PERMANENT</span>'; d.innerHTML='<div class="h-56 relative overflow-hidden bg-black">'+poster+badge+'</div><div class="p-3"><p class="font-bold text-sm truncate">'+m.title+'</p><p class="text-xs text-white/50">'+m.genre+' • '+m.year+'</p></div>'; d.onclick=()=>{ document.getElementById('player').classList.remove('hidden'); document.getElementById('ptitle').innerText=m.title; if(m.type==='movie'){document.getElementById('vid').src=m.video;} else {document.getElementById('vid').src=m.episodes[0].video; document.getElementById('episodeList').innerHTML=m.episodes.map((ep,i)=>'<div onclick="document.getElementById(\'vid\').src=\''+ep.video+'\';document.getElementById(\'vid\').play()" class="bg-white/5 p-2 rounded cursor-pointer text-sm">'+ep.title+'</div>').join('');} }; g.appendChild(d); }); }
function toast(m){let t=document.getElementById('toast'); t.innerText=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000);}
loadFromBlob();
